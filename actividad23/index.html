<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de JavaScript</title>
</head>
<body>
    <h1>Ejemplo de Funciones en JavaScript</h1>
    <label for="tamanioHInput">¿De qué longitud se requiere la línea?</label>
    <input type="number" id="tamanioHInput" min="0" placeholder="Ingresa un número" />
    <button id="enviar">Enviar</button>
    <label for="tamanioVInput">¿De que longitud requiere la linea vertical?</label>
    <input type="number" id="tamanioVInput" min="0", placeholder="Ingresa un numero">
    <button id="enviar2">Enviar</button>
    <label for="tamanioDInput">¿De que longitud requiere la linea vertical?</label>
    <input type="number" id="tamanioDInput" min="0", placeholder="Ingresa un numero">
    <button id="enviar3">Enviar</button>
    <label for="tamanioCInput">¿De que longitud requiere la linea vertical?</label>
    <input type="number" id="tamanioCInput" min="0", placeholder="Ingresa un numero">
    <button id="enviar4">Enviar</button>

    <h2>Resultado:</h2>
    <p id="resultado"></p>
    <p id="resultado2"></p>
    <p id="resultado3"></p>
    <p id="resultado4"></p>

    <script src="actividad3209.js"></script>
</body>
</html>
